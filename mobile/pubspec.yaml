name: palt_mobile
description: "PALT – Local network file transfer and system integration. Android client."
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # ── State management ──────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1

  # ── mDNS / Network Service Discovery ──────────────────────────────────────
  # Wraps platform-native NSD (Android) / NSNetServiceBrowser (iOS)
  nsd: ^5.0.0

  # ── Network utilities ─────────────────────────────────────────────────────
  network_info_plus: ^7.0.0

  # ── UI extras ─────────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  file_picker: ^11.0.2
  path_provider: ^2.1.5
  uuid: ^4.5.3
  permission_handler: ^12.0.1
  device_info_plus: ^12.4.0
  open_filex: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
